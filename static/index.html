<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlgoRhythm — Content Creator Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 16px 24px;
      text-align: center;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.5px;
    }

    header p {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 4px;
    }

    #chat-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 780px;
      flex: 1;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.agent { align-self: flex-start; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .message.user .avatar { background: #6d28d9; color: #fff; }
    .message.agent .avatar { background: #1e293b; color: #a78bfa; border: 1px solid #2d3148; }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.92rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #6d28d9;
      color: #f5f3ff;
      border-bottom-right-radius: 4px;
    }

    .message.agent .bubble {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #2d3148;
      border-bottom-left-radius: 4px;
    }

    .message.error .bubble {
      background: #3b0f0f;
      color: #fca5a5;
      border: 1px solid #7f1d1d;
    }

    /* Loading dots */
    .loading-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .dot {
      width: 7px; height: 7px;
      background: #a78bfa;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    #input-area {
      padding: 16px;
      background: #1a1d27;
      border-top: 1px solid #2d3148;
    }

    #input-row {
      display: flex;
      gap: 10px;
      max-width: 780px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      min-height: 46px;
      max-height: 140px;
    }

    #user-input:focus { border-color: #6d28d9; }
    #user-input::placeholder { color: #475569; }

    #send-btn {
      background: #6d28d9;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 20px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #send-btn:hover { background: #7c3aed; }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled { background: #2d3148; color: #64748b; cursor: not-allowed; }

    .welcome {
      text-align: center;
      color: #475569;
      font-size: 0.88rem;
      margin: auto;
      padding: 40px 20px;
    }

    .welcome strong { color: #a78bfa; display: block; font-size: 1.05rem; margin-bottom: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>AlgoRhythm — Content Creator Assistant</h1>
    <p>Powered by Gemini · Ask about trends, formats, and content ideas</p>
  </header>

  <div id="chat-container">
    <div id="messages">
      <div class="welcome">
        <strong>Hello, Creator! 👋</strong>
        Ask me what's trending, get content format ideas, or brainstorm your next post.
      </div>
    </div>

    <div id="input-area">
      <div id="input-row">
        <textarea
          id="user-input"
          placeholder="Ask AlgoRhythm something… e.g. What's trending on YouTube?"
          rows="1"
        ></textarea>
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    let isLoading = false;

    function clearWelcome() {
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();
    }

    function appendMessage(role, text) {
      clearWelcome();
      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? 'You' : 'AR';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrapper;
    }

    function appendError(text) {
      clearWelcome();
      const wrapper = document.createElement('div');
      wrapper.className = 'message agent error';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '!';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showLoading() {
      clearWelcome();
      const wrapper = document.createElement('div');
      wrapper.className = 'message agent';
      wrapper.id = 'loading-msg';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = 'AR';

      const bubble = document.createElement('div');
      bubble.className = 'bubble loading-bubble';
      bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeLoading() {
      const el = document.getElementById('loading-msg');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      appendMessage('user', text);
      showLoading();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });

        removeLoading();

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: `HTTP ${res.status}` }));
          appendError(`Error: ${err.detail || res.statusText}`);
        } else {
          const data = await res.json();
          appendMessage('agent', data.response);
        }
      } catch (err) {
        removeLoading();
        appendError(`Network error: ${err.message}`);
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    });
  </script>
</body>
</html>
